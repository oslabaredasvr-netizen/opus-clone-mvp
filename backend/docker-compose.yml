version: '3.8'

services:
  # Servidor Redis que fará a ponte entre o FastAPI e o Worker
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # Nossa API Python de roteamento rápido
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  # Robô operário onde o vídeo realmente é processado silenciosamente
  worker:
    build: .
    command: celery -A app.worker.tasks worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
